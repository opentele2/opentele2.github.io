site_name: opentele2
site_description: A Python library created to make life easier for Telegram API developers.
site_author: DedInc
site_url: https://opentele2.github.io/
repo_url: https://github.com/DedInc/opentele2
repo_name: DedInc/opentele2
edit_uri: ""

docs_dir: docs

copyright: >
  &copy; <a href="https://github.com/DedInc/opentele2/" target="_blank">DedInc &middot; opentele2</a>

theme:
  name: material
  custom_dir: overrides
  logo: assets/img/opentele.png
  favicon: assets/img/opentele.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.tabs.link
    - toc.follow
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/pymdownx-extras/extra-c12baed3e0.css
  - assets/css/custom.css

extra_javascript:
  - https://unpkg.com/mermaid@11.12.2/dist/mermaid.min.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/pymdownx-extras/extra-loader-9e2c67b9.js

extra:
  generator: false

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - smarty:
      smart_quotes: false
  - pymdownx.betterem
  - attr_list
  - def_list
  - tables
  - abbr
  - footnotes
  - md_in_html
  - pymdownx.superfences:
      preserve_tabs: true
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets
  - pymdownx.highlight:
      extend_pygments_lang:
        - lang: python
          name: python
          options:
            python3: true
        - lang: python
          name: pyinline
          options:
            python3: true
            startinline: true
      linenums_style: pymdownx-inline
      pygments_style: monokai
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo: opentele2
      repo_url_shortener: true
      repo_url_shorthand: true
      social_url_shortener: true
      social_url_shorthand: true
      user: DedInc
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.smartsymbols
  - pymdownx.emoji
  - pymdownx.escapeall:
      hardbreak: true
      nbsp: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.progressbar
  - pymdownx.arithmatex:
      block_tag: pre
      generic: true
  - pymdownx.mark
  - pymdownx.striphtml
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.saneheaders

nav:
  - Home: README.md
  - Examples:
      - Home: examples/README.md
      - Convert tdata to Telethon: examples/convert-tdata-to-telethon.md
      - Convert Telethon to tdata: examples/convert-telethon-to-tdata.md
      - Using official APIs: examples/using-official-apis.md
      - Session JSON Format: examples/session-json-format.md
  - Documentation:
      - Home: documentation/README.md
      - Telegram Desktop:
          - Home: documentation/telegram-desktop/README.md
          - TDesktop: documentation/telegram-desktop/tdesktop.md
          - Account: documentation/telegram-desktop/account.md
          - AuthKey: documentation/telegram-desktop/authkey.md
          - MTP: documentation/telegram-desktop/mtp.md
      - Telethon:
          - Home: documentation/telethon/README.md
          - TelegramClient: documentation/telethon/telegramclient.md
      - Authorization:
          - Home: documentation/authorization/README.md
          - API: documentation/authorization/api.md
          - LoginFlag: documentation/authorization/loginflag.md
      - Fingerprints & Consistency:
          - Home: documentation/fingerprints/README.md
      - Exceptions:
          - Home: documentation/exceptions/README.md
